<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ExpenseTracker</title>
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
    
    <!-- Fonts & Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-wallet"></i>
                <span>ExpenseTracker</span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="active">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="expenses.html">
                    <i class="fas fa-arrow-down"></i>
                    <span>Expenses</span>
                </a>
                <a href="income.html">
                    <i class="fas fa-arrow-up"></i>
                    <span>Income</span>
                </a>
                <a href="reports.html">
                    <i class="fas fa-chart-bar"></i>
                    <span>Reports</span>
                </a>
                <a href="receipts.html">
                    <i class="fas fa-receipt"></i>
                    <span>Receipts</span>
                </a>
                <a href="settings.html">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <img src="assets/images/user-avatar.png" alt="User">
                    <div class="user-details">
                        <span class="user-name">Prince Kaluwa</span>
                        <span class="user-email">prince@example.com</span>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="dashboard-header">
                <h1>Dashboard</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="window.location.href='expenses.html'">
                        <i class="fas fa-plus"></i> Add Expense
                    </button>
                    <button class="btn btn-outline" onclick="window.location.href='income.html'">
                        <i class="fas fa-plus"></i> Add Income
                    </button>
                </div>
            </header>
            
            <!-- Summary Cards -->
            <div class="summary-cards">
                <div class="card income-card">
                    <div class="card-icon">
                        <i class="fas fa-arrow-up"></i>
                    </div>
                    <div class="card-details">
                        <span class="card-label">Total Income</span>
                        <span class="card-value" id="totalIncome">$0.00</span>
                        <span class="card-change positive">+12.5%</span>
                    </div>
                </div>
                
                <div class="card expense-card">
                    <div class="card-icon">
                        <i class="fas fa-arrow-down"></i>
                    </div>
                    <div class="card-details">
                        <span class="card-label">Total Expenses</span>
                        <span class="card-value" id="totalExpenses">$0.00</span>
                        <span class="card-change negative">-8.2%</span>
                    </div>
                </div>

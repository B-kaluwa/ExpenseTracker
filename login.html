<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ExpenseTracker</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
</head>
<body>
    <!-- Preloader -->
    <div class="preloader" id="preloader">
        <div class="preloader-content">
            <div class="cash-flow-preloader">
                <div class="coin-stack">
                    <div class="coin coin-1"><i class="fas fa-coins"></i></div>
                    <div class="coin coin-2"><i class="fas fa-coins"></i></div>
                    <div class="coin coin-3"><i class="fas fa-coins"></i></div>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="preloader-progress"></div>
                </div>
                <div class="preloader-text">
                    <h3>ExpenseTracker</h3>
                    <p class="loading-text">Securing your connection...</p>
                    <p class="percentage-text" id="percentage">0%</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Container -->
    <div class="auth-container hidden" id="main-content">
        <div class="auth-box">
            <div class="auth-header">
                <i class="fas fa-wallet"></i>
                <h2>Welcome Back!</h2>
                <p>Login to track your expenses</p>
            </div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" id="email" name="email" required 
                           placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <input type="password" id="password" name="password" required 
                           placeholder="Enter your password">
                    <span class="toggle-password" onclick="togglePassword('password')">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#" onclick="forgotPassword()">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                    <span class="btn-text">Login</span>
                    <span class="btn-loader hidden"><i class="fas fa-spinner fa-spin"></i></span>
                </button>
            </form>
            
            <div class="social-login">
                <p>Or continue with</p>
                <button class="btn-google" onclick="handleGoogleLogin()">
                    <img src="https://www.google.com/favicon.ico" alt="Google">
                    Google
                </button>
            </div>
            
            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
        </div>
        
        <div class="auth-features">
            <div class="feature">
                <i class="fas fa-shield-alt"></i>
                <h4>Secure Login</h4>
                <p>Your data is encrypted and protected</p>
            </div>
            <div class="feature">
                <i class="fas fa-cloud-upload-alt"></i>
                <h4>Cloud Sync</h4>
                <p>Access from anywhere</p>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/preloader.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>

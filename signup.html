<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ExpenseTracker</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
</head>
<body>
    <!-- Preloader -->
    <div class="preloader" id="preloader">
        <div class="preloader-content">
            <div class="cash-flow-preloader">
                <div class="coin-stack">
                    <div class="coin coin-1"><i class="fas fa-coins"></i></div>
                    <div class="coin coin-2"><i class="fas fa-coins"></i></div>
                    <div class="coin coin-3"><i class="fas fa-coins"></i></div>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="preloader-progress"></div>
                </div>
                <div class="preloader-text">
                    <h3>ExpenseTracker</h3>
                    <p class="loading-text">Creating your account...</p>
                    <p class="percentage-text" id="percentage">0%</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Sign Up Container -->
    <div class="auth-container hidden" id="main-content">
        <div class="auth-box">
            <div class="auth-header">
                <i class="fas fa-wallet"></i>
                <h2>Create Account</h2>
                <p>Start tracking your expenses today</p>
            </div>
            
            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="fullName">
                        <i class="fas fa-user"></i>
                        Full Name
                    </label>
                    <input type="text" id="fullName" name="fullName" required 
                           placeholder="Enter your full name">
                </div>
                
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Email
                    </label>
                    <input type="email" id="email" name="email" required 
                           placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <input type="password" id="password" name="password" required 
                           placeholder="Create a password" minlength="6">
                    <span class="password-strength" id="passwordStrength"></span>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">
                        <i class="fas fa-lock"></i>
                        Confirm Password
                    </label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required 
                           placeholder="Confirm your password">
                </div>
                
                <div class="form-group terms">
                    <label>
                        <input type="checkbox" id="terms" required>
                        <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="signupBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader hidden"><i class="fas fa-spinner fa-spin"></i></span>
                </button>
            </form>
            
            <div class="social-login">
                <p>Or sign up with</p>
                <button class="btn-google" onclick="handleGoogleSignup()">
                    <img src="https://www.google.com/favicon.ico" alt="Google">
                    Google
                </button>
            </div>
            
            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/preloader.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - ExpenseTracker</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-wallet"></i>
            <span>ExpenseTracker</span>
        </div>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="expenses.html">Expenses</a>
            <a href="income.html">Income</a>
            <a href="reports.html">Reports</a>
            <a href="settings.html" class="active">Settings</a>
        </div>
        <div class="nav-user" id="navUser"></div>
    </nav>

    <!-- Settings Container -->
    <div class="settings-container">
        <div class="settings-header">
            <h1><i class="fas fa-cog"></i> Settings</h1>
            <p>Manage your account preferences and settings</p>
        </div>

        <div class="settings-grid">
            <!-- Profile Settings -->
            <div class="settings-card">
                <h2><i class="fas fa-user"></i> Profile Information</h2>
                <form id="profileForm" onsubmit="updateProfile(event)">
                    <div class="form-group">
                        <label for="displayName">Display Name</label>
                        <input type="text" id="displayName" name="displayName">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" readonly>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone">
                    </div>
                    <button type="submit" class="btn btn-primary">Update Profile</button>
                </form>
            </div>

            <!-- Preferences -->
            <div class="settings-card">
                <h2><i class="fas fa-sliders-h"></i> Preferences</h2>
                <form id="preferencesForm" onsubmit="updatePreferences(event)">
                    <div class="form-group">
                        <label for="currency">Default Currency</label>
                        <select id="currency" name="currency">
                            <option value="USD">USD ($)</option>
                            <option value="EUR">EUR (€)</option>
                            <option value="GBP">GBP (£)</option>
                            <option value="JPY">JPY (¥)</option>
                            <option value="CAD">CAD ($)</option>
                            <option value="AUD">AUD ($)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="dateFormat">Date Format</label>
                        <select id="dateFormat" name="dateFormat">
                            <option value="MM/DD/YYYY">MM/DD/YYYY</option>
                            <option value="DD/MM/YYYY">DD/MM/YYYY</option>
                            <option value="YYYY-MM-DD">YYYY-MM-DD</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="weekStart">Week Starts On</label>
                        <select id="weekStart" name="weekStart">
                            <option value="sunday">Sunday</option>
                            <option value="monday">Monday</option>
                        </select>
                    </div>
                    <div class="form-group checkbox">
                        <label>
                            <input type="checkbox" id="darkMode" name="darkMode">
                            Enable Dark Mode
                        </label>
                    </div>
                    <div class="form-group checkbox">
                        <label>
                            <input type="checkbox" id="notifications" name="notifications">
                            Enable Notifications
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Preferences</button>
                </form>
            </div>

            <!-- Budget Settings -->
            <div class="settings-card">
                <h2><i class="fas fa-chart-line"></i> Monthly Budget</h2>
                <form id="budgetForm" onsubmit="updateBudget(event)">
                    <div class="form-group">
                        <label for="monthlyBudget">Monthly Budget Limit</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" id="monthlyBudget" name="monthlyBudget" step="0.01" min="0">
                        </div>
                    </div>
                    <div class="form-group checkbox">
                        <label>
                            <input type="checkbox" id="budgetAlerts" name="budgetAlerts">
                            Alert me when I reach 80% of budget
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Budget</button>
                </form>
            </div>

            <!-- Categories -->
            <div class="settings-card">
                <h2><i class="fas fa-tags"></i> Custom Categories</h2>
                <div class="categories-list" id="categoriesList">
                    <!-- Categories will be loaded here -->
                </div>
                <div class="add-category">
                    <input type="text" id="newCategory" placeholder="New category name">
                    <select id="newCategoryType">
                        <option value="expense">Expense</option>
                        <option value="income">Income</option>
                    </select>
                    <button class="btn btn-primary" onclick="addCategory()">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>

            <!-- Security -->
            <div class="settings-card">
                <h2><i class="fas fa-shield-alt"></i> Security</h2>
                <form id="securityForm" onsubmit="changePassword(event)">
                    <div class="form-group">
                        <label for="currentPassword">Current Password</label>
                        <input type="password" id="currentPassword" name="currentPassword">
                    </div>
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" name="newPassword">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm New Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword">
                    </div>
                    <button type="submit" class="btn btn-primary">Change Password</button>
                </form>
            </div>

            <!-- Data Management -->
            <div class="settings-card">
                <h2><i class="fas fa-database"></i> Data Management</h2>
                <div class="data-actions">
                    <button class="btn btn-outline" onclick="exportData()">
                        <i class="fas fa-download"></i> Export Data
                    </button>
                    <button class="btn btn-outline" onclick="importData()">
                        <i class="fas fa-upload"></i> Import Data
                    </button>
                    <button class="btn btn-outline danger" onclick="deleteData()">
                        <i class="fas fa-trash"></i> Delete All Data
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
